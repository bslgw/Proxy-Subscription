name: Compile TCP-Brutal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev libelf-dev swig

      - name: Setup SDK
        run: |
          # 自动获取 x86-64 架构下最新版本 SDK 的 URL
          # 该指令通过官网 index 获取文件列表，确保找到真实存在的文件
          BASE_URL="https://downloads.openwrt.org/snapshots/targets/x86/64/"
          SDK_FILE=$(curl -s $BASE_URL | grep -o 'openwrt-sdk-.*-x86-64_.*.tar.xz' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "Error: 未找到 SDK 文件"
            exit 1
          fi
          
          echo "Downloading $SDK_FILE ..."
          wget "$BASE_URL$SDK_FILE"
          tar -xf "$SDK_FILE" --strip-components=1

      - name: Prepare Feeds
        run: |
          echo "src-git tcp_brutal https://github.com/haruue-net/openwrt-tcp-brutal.git;master" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install tcp-brutal

      - name: Compile
        run: |
          make defconfig
          make package/feeds/tcp_brutal/tcp-brutal/compile V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kmod-brutal
          path: bin/targets/x86/64/packages/kmod-brutal_*.ipk

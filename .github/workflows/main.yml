name: OpenWrt-x86_64-6.6.127

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev \
        libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
        file wget

    - name: Clone OpenWrt
      run: |
        git clone -b openwrt-24.10 https://github.com/openwrt/openwrt
        cd openwrt

        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add brutal patches
      run: |
        cd openwrt

        mkdir -p target/linux/x86/patches-6.6

        cat > target/linux/x86/patches-6.6/999-brutal.patch << 'EOF'
        diff --git a/net/ipv4/tcp.c b/net/ipv4/tcp.c
        index 1111111..2222222 100644
        --- a/net/ipv4/tcp.c
        +++ b/net/ipv4/tcp.c
        @@
        +/* brutal patch placeholder */
        EOF

    - name: Configure
      run: |
        cd openwrt

        cat > .config << EOF
        CONFIG_TARGET_x86=y
        CONFIG_TARGET_x86_64=y
        CONFIG_TARGET_x86_64_DEVICE_generic=y

        CONFIG_PACKAGE_luci=y

        CONFIG_KERNEL_BBR=y
        CONFIG_TCP_CONG_BBR=y

        CONFIG_PACKAGE_kmod-tcp-bbr=y

        CONFIG_PACKAGE_htop=y
        CONFIG_PACKAGE_curl=y

        EOF

        make defconfig

    - name: Download
      run: |
        cd openwrt
        make download -j$(nproc)

    - name: Build
      run: |
        cd openwrt
        make -j$(nproc) V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-x86_64
        path: openwrt/bin/targets/

name: Build-iStoreOS-Brutal-100M-Fixed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget libelf-dev zstd

      - name: Download and Prepare SDK
        run: |
          # 修正：這才是 24.10.6 x86_64 的真實 SDK 下載鏈接
          SDK_URL="https://openwrt.org"
          wget -q "$SDK_URL" -O openwrt-sdk.tar.zst
          
          # 檢查文件是否下載成功且格式正確
          file openwrt-sdk.tar.zst
          
          tar -I zstd -xf openwrt-sdk.tar.zst
          mv openwrt-sdk-* sdk
          cd sdk && make defconfig && cd ..

      - name: Hard Cross-Compile with 100Mbps Patch
        run: |
          export STAGING_DIR="$(pwd)/sdk/staging_dir"
          export TOOLCHAIN_BIN="$(pwd)/sdk/staging_dir/toolchain-x86_64_gcc-13.3.0_musl/bin"
          export PATH="$TOOLCHAIN_BIN:$PATH"
          export KERNEL_DIR="$(pwd)/sdk/build_dir/target-x86_64_musl/linux-x86_64/linux-6.6.127"
          
          git clone https://github.com raw-src
          cd raw-src

          # 注入 100Mbps 保底參數代碼 (100Mbps = 12,500,000 Bytes/s)
          # 添加參數定義與 module_param
          sed -i '1i #include <linux/moduleparam.h>' tcp_brutal.c
          sed -i '/#include <linux\/moduleparam.h>/a static unsigned long long default_rate = 12500000;\nmodule_param(default_rate, ullong, 0644);\nMODULE_PARM_DESC(default_rate, "Default rate in bytes/s");' tcp_brutal.c
          
          # 在 brutal_init 函數中強制賦值，確保即使插件不傳參也跑 100M
          sed -i '/ca->cwnd_gain = 20;/a \    ca->rate = default_rate;' tcp_brutal.c

          # 執行編譯
          make -C "$KERNEL_DIR" M="$(pwd)" ARCH=x86_64 CROSS_COMPILE="x86_64-openwrt-linux-musl-" modules

      - name: Collect Output Files
        run: |
          mkdir -p output_artifacts
          cp raw-src/brutal.ko output_artifacts/
          ls -la output_artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-tcp-brutal-100M-fixed
          path: output_artifacts/

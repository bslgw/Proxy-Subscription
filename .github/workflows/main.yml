name: Build OpenWrt Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库代码
      - name: Checkout current repository
        uses: actions/checkout@v4

      # 2. 检出外部依赖仓库 (sbwml/openwrt-tcp-brutal)
      - name: Checkout external repository
        uses: actions/checkout@v4
        with:
          repository: sbwml/openwrt-tcp-brutal
          path: package/tcp-brutal  # 这里指定你想要的路径
          token: ${{ secrets.MY_PAT }} # 使用你在 Settings 中添加的 Secret

      # 3. 后续构建步骤
      - name: Build project
        run: |
          echo "Building..."
          # 你的构建命令
          ls -R package/tcp-brutal

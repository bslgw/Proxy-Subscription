name: Build-iStoreOS-Brutal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget libelf-dev zstd

      - name: Download OpenWrt Official 24.10.6 SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -q --tries=5 "$SDK_URL" -O openwrt-sdk.tar.zst
          tar -I zstd -xf openwrt-sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: Clone Raw Source Code
        run: |
          # 💡 核心操作：直接拉取最底层的 brutal 纯 C 语言源码仓库
          git clone https://github.com/apernet/tcp-brutal.git raw-src

      - name: Hard Cross-Compile (💡 纯物理强行编译)
        run: |
          # 1. 自动定位 SDK 里的内核源码夹和编译器
          KERNEL_DIR=$(find sdk/build_dir/ -maxdepth 3 -name "linux-6.6.*" | head -n 1)
          TOOLCHAIN_BIN=$(find sdk/staging_dir/ -maxdepth 3 -name "bin" | grep "toolchain" | head -n 1)
          CROSS_COMPILE_PREFIX=$(find $TOOLCHAIN_BIN -name "x86_64-openwrt-linux-musl-gcc" | sed 's/gcc//g')
          
          export PATH="$TOOLCHAIN_BIN:$PATH"
          export STAGING_DIR="$(pwd)/sdk/staging_dir"
          
          # 2. 💡 绝杀：直接让内核编译器在源码目录硬生生编译出真正的驱动文件，没有任何打包工具能拦截它！
          cd raw-src
          make -C "../$KERNEL_DIR" M="$(pwd)" ARCH=x86_64 CROSS_COMPILE="$CROSS_COMPILE_PREFIX" modules

      - name: Collect Output Files
        run: |
          mkdir -p ../output_artifacts
          
          echo "=== 正在捞取纯正的 49KB 内核驱动文件 ==="
          # 💡 这次我们只拿最纯粹的内核模块驱动
          find raw-src/ -name "brutal.ko" -exec cp -v {} ../output_artifacts/ \;
          
          echo "=== 检查成果清单 ==="
          ls -la ../output_artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-tcp-brutal-24.10.6
          path: output_artifacts/
          if-no-files-found: error

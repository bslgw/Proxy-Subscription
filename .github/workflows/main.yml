name: Build OpenWrt x86 with TCP Brutal

on:
  workflow_dispatch:  # 手动触发
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch/tag (e.g. v24.10.6 or openwrt-24.10)'
        required: true
        default: 'v24.10.6'  # 当前支持 6.6.127 的稳定分支/版本

jobs:
  build:
    runs-on: ubuntu-24.04  # 或 ubuntu-latest
    steps:
      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ github.event.inputs.openwrt_branch || 'v24.10.6' }}
          fetch-depth: 1

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add TCP Brutal package feed
        run: |
          # 添加 brutal 包（来自 sbwml）
          cat >> feeds.conf.default << EOF
          src-git tcp_brutal https://github.com/sbwml/package_kernel_tcp-brutal.git
          EOF
          ./scripts/feeds update tcp_brutal
          ./scripts/feeds install -a -p tcp_brutal

      - name: Configure (使用官方 x86 配置 + brutal)
        run: |
          # 下载官方 x86_64 config（或使用 make defconfig 后手动调整）
          wget -O .config https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/config.buildinfo
          
          # 启用 TCP Brutal
          cat >> .config << EOF
          CONFIG_PACKAGE_kmod-tcp-brutal=y
          CONFIG_TCP_BRUTAL=y  # 如果 Makefile 有对应选项
          # 可选：其他优化
          CONFIG_PACKAGE_luci=y
          EOF
          
          make defconfig

      - name: Download packages & Build
        run: |
          make download -j$(nproc)
          make -j$(nproc) V=s || make -j1 V=s  # 如果失败用单线程重试

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-kernel-6.6.127-brutal
          path: |
            bin/targets/x86/64/*.img.gz
            bin/targets/x86/64/*.squashfs
            bin/targets/x86/64/packages/kmod-tcp-brutal*
          retention-days: 30

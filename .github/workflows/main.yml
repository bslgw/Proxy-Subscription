name: Build TCP Brutal Kernel Module Only (x86_64 - 6.6)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出 OpenWrt 源码 (v24.10)
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: v24.10.6
          fetch-depth: 1

      - name: 更新 feeds 并添加 TCP Brutal
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 添加 Brutal 模块源
          cat >> feeds.conf.default << EOF
          src-git tcp_brutal https://github.com/sbwml/package_kernel_tcp-brutal.git
          EOF
          ./scripts/feeds update tcp_brutal
          ./scripts/feeds install -a -p tcp_brutal

      - name: 配置 x86_64 + 只启用 Brutal
        run: |
          wget -O .config https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/config.buildinfo

          cat >> .config << EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_PACKAGE_kmod-tcp-brutal=y
          CONFIG_TCP_BRUTAL=m
          EOF

          make defconfig

      - name: 编译内核（只生成模块所需）
        run: make target/linux/compile -j$(nproc) || make target/linux/compile -j2 V=s

      - name: 只编译 Brutal 模块
        run: make package/feeds/tcp_brutal/tcp-brutal/compile -j$(nproc) V=s

      - name: 整理输出文件（只保留 Brutal 模块）
        run: |
          mkdir -p ./output
          # 复制 ipk 安装包（推荐使用这个）
          cp bin/targets/x86/64/packages/kmod-tcp-brutal*.ipk ./output/ 2>/dev/null || true
          # 如果需要原始 .ko 文件
          find build_dir -name "*brutal*.ko" -exec cp {} ./output/ \; 2>/dev/null || true
          ls -lh ./output/

      - name: 上传 Brutal 内核模块
        uses: actions/upload-artifact@v4
        with:
          name: kmod-tcp-brutal-x86_64-kernel-6.6.127
          path: ./output/
          retention-days: 30

name: Build-iStoreOS-Brutal

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget libelf-dev zstd

      - name: Download OpenWrt Official 24.10.6 SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          echo "正在下载官方 24.10.6 编译环境..."
          wget -q --tries=5 "$SDK_URL" -O openwrt-sdk.tar.zst
          tar -I zstd -xf openwrt-sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: Update and Install Feeds
        run: |
          cd sdk
          echo "src-git brutal_feed https://github.com/haruue-net/openwrt-tcp-brutal.git" >> feeds.conf.default
          
          sed -i 's/git.openwrt.org\/feed\/packages.git/github.com\/openwrt\/packages.git/g' feeds.conf.default
          sed -i 's/git.openwrt.org\/project\/luci.git/github.com\/openwrt\/luci.git/g' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject Configuration & Clean Bad Deps
        run: |
          cd sdk
          sed -i '/kmod-phy-bcm-ns-usb/d' package/kernel/linux/Makefile
          sed -i '/onionshare-cli/d' feeds/packages/net/onionshare-cli/Makefile || true
          
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=m" >> .config
          make defconfig

      - name: Trigger SDK Env Prepare (💡 唤醒沉睡的编译器结构)
        run: |
          cd sdk
          # 让 SDK 自己把内部的内核头文件和编译器目录解压并吐出来
          make package/feeds/brutal_feed/tcp-brutal/prepare V=s

      - name: Hard Cross-Compile (💡 绝对路径合体爆破)
        run: |
          # 1. 🔍 物理锁死官方 SDK 内部专用工具链二进制的绝对骨骼路径
          TOOLCHAIN_BIN=$(find "$(pwd)/sdk/staging_dir/" -path "*/toolchain-*/bin" | head -n 1)
          echo "🎯 抓到官方专用编译器藏身地: $TOOLCHAIN_BIN"
          
          # 2. 强行把这个极为隐蔽的官方 bin 目录灌入系统血液，让命令行随时能找到它
          export PATH="$TOOLCHAIN_BIN:$PATH"
          export STAGING_DIR="$(pwd)/sdk/staging_dir"
          
          # 3. 🔍 物理锁死官方解压出来的内核源码绝对路径
          KERNEL_DIR=$(find "$(pwd)/sdk/build_dir/" -path "*/linux-6.6.*" | head -n 1)
          echo "🎯 抓到官方内核源码路径: $KERNEL_DIR"
          
          # 4. 克隆源码，高歌猛进直接生啃编译！
          git clone https://github.com/apernet/tcp-brutal.git raw-src
          cd raw-src
          make -C "$KERNEL_DIR" M="$(pwd)" ARCH=x86_64 CROSS_COMPILE="x86_64-openwrt-linux-musl-" modules

      - name: Collect Output Files
        run: |
          mkdir -p "$GITHUB_WORKSPACE/output_artifacts"
          
          echo "=== 正在精准提取生成的纯正 musl 架构 49KB 驱动 ==="
          cp -v "$GITHUB_WORKSPACE/raw-src/brutal.ko" "$GITHUB_WORKSPACE/output_artifacts/" || true
          
          # 双重保险：如果有打好的标准 ipk，顺便一块打包带走
          find "$GITHUB_WORKSPACE/sdk/bin/" -name "*brutal*.ipk" -exec cp -v {} "$GITHUB_WORKSPACE/output_artifacts/" \; || true
          
          echo "=== 成果盘点 ==="
          ls -la "$GITHUB_WORKSPACE/output_artifacts/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-tcp-brutal-24.10.6
          path: output_artifacts/
          if-no-files-found: error
